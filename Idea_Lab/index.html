<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Lab - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.2), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
        }

        #loginError {
            color: var(--danger);
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 20px;
        }
    </style>

</head>
<body>
    <div class="login-container">
        <div class="glass-panel login-card">
            <div class="login-header">
                <h1 class="text-gradient">Idea Lab</h1>
                <p>Component Management System</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username / ID</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your ID" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div id="loginError" class="hidden">Invalid credentials</div>
                
                <button type="submit" class="btn btn-primary w-full mt-4">
                    Sign In
                </button>
            </form>

            <div class="mt-4 text-center">
                <p style="font-size: 0.8rem; color: var(--text-muted)">Demo Accounts:<br>
                Student: student1 / password<br>
                Mentor: mentor1 / password<br>
                Admin: admin / admin123</p>
            </div>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="login.js"></script>
</body>
</html>
