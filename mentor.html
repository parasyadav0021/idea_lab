<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Dashboard - Idea Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .student-list {
            grid-template-columns: 1.5fr 1fr 1.5fr 1fr;
        }
        .component-grid {
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1.5fr;
        }
    </style>

</head>
<body>
    <div class="dashboard-layout">
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <h2 class="text-gradient mb-8">Idea Lab</h2>
            <nav>
                <a class="nav-item active">Mentorship Roster</a>
            </nav>
            <div style="position: absolute; bottom: 2rem;">
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="mb-8 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <h1 id="pageTitle">Mentorship Roster</h1>
                </div>
                <div class="user-info">
                    <span id="welcomeUser" style="color: var(--text-muted);">Welcome, Mentor</span>
                </div>
            </header>

            <!-- Mentor Stats Widget -->

            <section id="my-projects-section" class="glass-panel section-card">
                <h3 class="mb-4">Filters</h3>
                <div class="filter-row">
                    <div class="form-group">
                        <label>Academic Year</label>
                        <select class="form-control" id="filterAcademicYear" onchange="loadGroups()">
                            <option value="All">All</option>
                            <option value="2023-24">2023-24</option>
                            <option value="2024-25">2024-25</option>
                            <option value="2025-26">2025-26</option>
                            <option value="2026-27">2026-27</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <select class="form-control" id="filterYear" onchange="loadGroups()">
                            <option value="All">All</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <select class="form-control" id="filterSem" onchange="loadGroups()">
                            <option value="All">All</option>
                            <option value="1">Sem 1</option>
                            <option value="2">Sem 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Division</label>
                        <input type="text" class="form-control" id="filterDiv" placeholder="e.g. A" oninput="loadGroups()">
                    </div>
                </div>

                <div class="tabs">
                    <div class="tab active" onclick="setTab('Active')" id="tabActive">Active Groups</div>
                    <div class="tab" onclick="setTab('Completed')" id="tabCompleted">Completed Groups</div>
                </div>
                
                <div id="groupsContainer">
                    <!-- Groups populated here -->
                </div>
            </section>
        </main>
    </div>

    <script src="db.js"></script>
    <script src="mentor.js"></script>
</body>
</html>
